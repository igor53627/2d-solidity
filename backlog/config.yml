project_name: "2d-solidity"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["forge test passes for the change", "Regression tests cover public API behavior affected by the change", "NatSpec and README reviewed for staleness against changed code", "Final summary added before marking Done"]
date_format: yyyy-mm-dd
max_column_width: 20
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: false
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "task"
